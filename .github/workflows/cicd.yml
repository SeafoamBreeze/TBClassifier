name: TB Classifier Pipeline

permissions:
  id-token: write
  contents: read

env:
  RUN_01_TRAINING_SCRIPT:         ${{ vars.RUN_01_TRAINING_SCRIPT }}
  RUN_02_DEPLOY_SCRIPT:           ${{ vars.RUN_02_DEPLOY_SCRIPT }}
  MLFLOW_DEFAULT_ARTIFACT_ROOT:   ${{ vars.MLFLOW_DEFAULT_ARTIFACT_ROOT }}
  DEMO_VERSION:                   ${{ vars.DEMO_VERSION }}

on: 
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason"
        type: string
        default: "manual-deploy"

jobs:

  show-settings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Display Pipeline Settings
        run: |
          echo "=========================================="
          echo "PIPELINE SETTINGS"
          echo "=========================================="
          echo "Trigger:                            ${{ github.event_name }}"
          echo "Reason:                             ${{ github.event.inputs.reason || 'N/A' }}"
          echo "RUN_01_TRAINING_SCRIPT:             ${{ vars.RUN_01_TRAINING_SCRIPT }}"
          echo "RUN_02_DEPLOY_SCRIPT:               ${{ vars.RUN_02_DEPLOY_SCRIPT }}"
          echo "MLFLOW_DEFAULT_ARTIFACT_ROOT:       ${{ vars.MLFLOW_DEFAULT_ARTIFACT_ROOT }}"
          echo "DEMO_VERSION:                       ${{ vars.DEMO_VERSION }}"
          echo "=========================================="

  train:
    needs: [show-settings]
    runs-on: ubuntu-latest
    if: vars.RUN_01_TRAINING_SCRIPT == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.AWS_ROLE }}

      - name: Build & Run Docker
        run: |
          echo "Build & Run Docker"
          docker build -f dockerfile.train -t tbclassifier .
          docker run --rm \
            -e DEMO_VERSION=$DEMO_VERSION \
            -e MLFLOW_DEFAULT_ARTIFACT_ROOT=$MLFLOW_DEFAULT_ARTIFACT_ROOT \
            -e AWS_ACCESS_KEY_ID \
            -e AWS_SECRET_ACCESS_KEY \
            -e AWS_SESSION_TOKEN \
            -e AWS_REGION \
            tbclassifier

  deploy:
    needs: [show-settings]
    runs-on: ubuntu-latest
    if: vars.RUN_02_DEPLOY_SCRIPT == 'true'
    environment: PRODUCTION

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.AWS_ROLE }}

    - name: Build, Tag, and Push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: tbclassifier-inference
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -f dockerfile.inference -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: "tbclassifier-demo"
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: "tbclassifier-inference"
        cluster: "advanced-frog-ig3pzu"
        wait-for-service-stability: true